<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolão Copa 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #071c0e; font-family: 'Montserrat', sans-serif; color: #fff; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .header { background: linear-gradient(180deg, #0a2e17 0%, #071c0e 100%); border-bottom: 3px solid #ffd700; padding: 20px; margin-bottom: 20px; text-align: center; }
    .header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: #ffd700; letter-spacing: 3px; }
    .content { background: #fff; border-radius: 16px; padding: 30px; box-shadow: 0 8px 40px rgba(0,0,0,.4); }
    .content h2 { color: #071c0e; margin-bottom: 20px; }
    .table { width: 100%; border-collapse: collapse; }
    .table th { background: linear-gradient(90deg, #0a2e17, #1a5c30); color: #ffd700; padding: 12px; text-align: left; }
    .table td { padding: 10px; border-bottom: 1px solid #eee; color: #071c0e; }
    .table tr:hover { background: #f5f5f5; }
    .loading { text-align: center; padding: 40px; color: #ffd700; font-size: 24px; }
    .error { background: #f8d7da; color: #721c24; padding: 20px; border-radius: 8px; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;
    
    function App() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      useEffect(() => {
        fetch('results.json')
          .then(r => r.json())
          .then(d => {
            console.log('Dados carregados:', d);
            setData(d);
            setLoading(false);
          })
          .catch(e => {
            console.error('Erro:', e);
            setError(e.message);
            setLoading(false);
          });
      }, []);

      if (loading) {
        return (
          <div className="container">
            <div className="header">
              <h1>⚽ BOLÃO COPA 2026</h1>
            </div>
            <div className="loading">Carregando dados...</div>
          </div>
        );
      }

      if (error) {
        return (
          <div className="container">
            <div className="header">
              <h1>⚽ BOLÃO COPA 2026</h1>
            </div>
            <div className="error">
              <strong>Erro ao carregar:</strong> {error}
            </div>
          </div>
        );
      }

      if (!data) {
        return (
          <div className="container">
            <div className="header">
              <h1>⚽ BOLÃO COPA 2026</h1>
            </div>
            <div className="error">
              <strong>Erro:</strong> Nenhum dado disponível
            </div>
          </div>
        );
      }

      // Calcular ranking
      const ranking = data.participants.map(name => {
        let pts = 0;
        data.games.forEach(g => {
          if (g.resultado && (g.guesses[name] || '') === g.resultado) {
            pts++;
          }
        });
        return { name, pts };
      }).sort((a, b) => b.pts - a.pts);

      return (
        <div className="container">
          <div className="header">
            <h1>🏆 BOLÃO COPA 2026 🏆</h1>
            <p style={{marginTop: 10, fontSize: 14, color: '#6db882'}}>
              ⚽ {data.games.length} jogos | {data.participants.length} participantes
            </p>
          </div>

          <div className="content">
            <h2>📊 Ranking Geral</h2>
            <table className="table">
              <thead>
                <tr>
                  <th style={{width: '50px'}}>#</th>
                  <th>Participante</th>
                  <th style={{width: '100px', textAlign: 'center'}}>Pontos</th>
                </tr>
              </thead>
              <tbody>
                {ranking.map((p, i) => (
                  <tr key={p.name}>
                    <td><strong>{i + 1}</strong></td>
                    <td>{p.name}</td>
                    <td style={{textAlign: 'center', fontWeight: 'bold', color: '#0d3b1e', fontSize: 16}}>
                      {p.pts}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>

            <h2 style={{marginTop: 40}}>📋 Últimos Jogos com Resultado</h2>
            <table className="table">
              <thead>
                <tr>
                  <th>Jogo</th>
                  <th style={{width: '100px', textAlign: 'center'}}>Placar</th>
                  <th style={{width: '80px', textAlign: 'center'}}>Resultado</th>
                </tr>
              </thead>
              <tbody>
                {data.games.filter(g => g.resultado).slice(-10).map((g, i) => (
                  <tr key={g.id}>
                    <td>{g.match}</td>
                    <td style={{textAlign: 'center'}}>
                      {g.gols_a && g.gols_b ? `${g.gols_a} × ${g.gols_b}` : '—'}
                    </td>
                    <td style={{textAlign: 'center', fontWeight: 'bold', color: '#0d3b1e'}}>
                      {g.resultado}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
