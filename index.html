<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Bolão Copa 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#071c0e;font-family:'Montserrat',sans-serif;color:#fff;min-height:100vh}
  button{cursor:pointer;font-family:'Montserrat',sans-serif}

  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:#071c0e}
  ::-webkit-scrollbar-thumb{background:#2d6a40;border-radius:3px}

  .home-bg{min-height:100vh;background:radial-gradient(ellipse at 60% 0%,#1a5c30 0%,#071c0e 65%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;position:relative;overflow:hidden;}
  .home-bg::before{content:"";position:absolute;inset:0;
    background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");}

  .home-btn{width:100%;max-width:420px;padding:28px 32px;border-radius:20px;border:none;
    display:flex;align-items:center;gap:20px;text-align:left;cursor:pointer;
    transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;}
  .home-btn:hover{transform:translateY(-4px) scale(1.01);}
  .home-btn::after{content:"";position:absolute;inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 60%);
    border-radius:20px;pointer-events:none;}
  .home-btn-icon{font-size:42px;flex-shrink:0;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4));}
  .home-btn-label{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;line-height:1;}
  .home-btn-sub{font-size:12px;font-weight:600;opacity:.8;margin-top:4px;letter-spacing:.5px;}

  .btn-ranking{background:linear-gradient(135deg,#b8860b 0%,#ffd700 50%,#e6a800 100%);
    color:#1a0e00;box-shadow:0 8px 32px rgba(255,215,0,.45),0 2px 8px rgba(0,0,0,.4);}
  .btn-palpites{background:linear-gradient(135deg,#0a4a22 0%,#1a8a40 50%,#0d6030 100%);
    color:#fff;box-shadow:0 8px 32px rgba(26,138,64,.5),0 2px 8px rgba(0,0,0,.4);
    border:1px solid rgba(255,255,255,.1);}
  .btn-jogos{background:linear-gradient(135deg,#0d2d5c 0%,#1a4fa8 50%,#0a3a80 100%);
    color:#fff;box-shadow:0 8px 32px rgba(26,79,168,.5),0 2px 8px rgba(0,0,0,.4);
    border:1px solid rgba(255,255,255,.1);}

  .app-header{background:linear-gradient(180deg,#0a2e17 0%,#071c0e 100%);
    border-bottom:3px solid #ffd700;padding:16px 16px 0;
    box-shadow:0 4px 24px rgba(0,0,0,.5);}
  .nav-btn{padding:10px 18px;font-weight:700;font-size:12px;
    border:none;border-radius:10px 10px 0 0;transition:all .2s;letter-spacing:.5px;}
  .nav-btn.active{background:#ffd700;color:#0d3b1e;box-shadow:0 -4px 12px rgba(255,215,0,.3);}
  .nav-btn.inactive{background:transparent;color:#a8d5b8;}
  .nav-btn.inactive:hover{background:rgba(255,255,255,.07);color:#fff;}

  .sub-nav{display:flex;gap:4;margin-bottom:16px;border-bottom:2px solid rgba(255,255,255,.1);padding-bottom:8px;}
  .sub-nav-btn{padding:8px 16px;font-weight:700;font-size:12px;border:none;background:transparent;color:#a8d5b8;
    border-bottom:3px solid transparent;transition:all .2s;letter-spacing:.5px;cursor:pointer;}
  .sub-nav-btn.active{color:#ffd700;border-bottom-color:#ffd700;}
  .sub-nav-btn:hover{color:#fff;}

  .rank-table{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.4);}
  .rank-head{display:grid;grid-template-columns:54px 1fr 72px 90px;
    background:linear-gradient(90deg,#0a2e17,#1a5c30);
    padding:12px 16px;font-size:11px;font-weight:700;color:#ffd700;letter-spacing:1.5px;}
  .rank-row{display:grid;grid-template-columns:54px 1fr 72px 90px;
    padding:14px 16px;align-items:center;border-bottom:1px solid #e8f0ea;transition:background .15s;}
  .rank-row:hover{background:#f0f7f1;}
  .rank-pos{text-align:center;}
  .pts-badge{border-radius:30px;padding:4px 18px;font-weight:800;font-size:14px;letter-spacing:.5px;}

  .pt-wrap{overflow-x:auto;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.4);}
  .pt{border-collapse:collapse;width:max-content;min-width:100%;font-size:12.5px;background:#fff;}
  .pt th{background:linear-gradient(90deg,#0a2e17,#1a5c30);color:#ffd700;font-weight:700;
    letter-spacing:.5px;padding:11px 7px;white-space:nowrap;position:sticky;top:0;z-index:2;}
  .pt th.cj{position:sticky;left:0;z-index:3;min-width:170px;text-align:left;padding-left:14px;}
  .pt th.cr{min-width:62px;text-align:center;}
  .pt td{padding:8px 6px;border-bottom:1px solid #eaf0eb;vertical-align:middle;}
  .pt td.cj{position:sticky;left:0;background:#f5f9f5;z-index:1;
    font-size:12px;font-weight:600;color:#1a2e1d;line-height:1.35;min-width:170px;padding-left:14px;}
  .pt tr:nth-child(even) td.cj{background:#eef5ef;}
  .pt td.cr{text-align:center;min-width:62px;}
  .pt td.gc{text-align:center;font-weight:700;font-size:12px;min-width:36px;}
  .pt tr:hover td{background:#f0f7f1!important;}.pt tr:hover td.cj{background:#e4f0e5!important;}
  .g-hit{background:#d4edda;color:#155724;}
  .g-mis{background:#f8d7da;color:#721c24;}
  .g-wai{background:#f5f5f5;color:#666;}
  .g-non{background:#fafafa;color:#ccc;}

  .jogos-card{background:#fff;border-radius:14px;overflow:hidden;
    box-shadow:0 6px 28px rgba(0,0,0,.35);}
  .jogo-row{padding:12px 16px;display:flex;align-items:center;gap:12px;transition:background .15s;}
  .jogo-row:hover{background:#f5faf6;}
  .jogo-row.penalties{background:#fffbea;}
  .jogo-sep{height:1px;background:#e8f0ea;}
  .jogo-match{flex:1;font-size:14px;color:#1a2e1d;font-weight:600;line-height:1.3;}
  .placar-badge{color:#fff;border-radius:10px;
    padding:6px 14px;font-weight:700;font-size:14px;
    letter-spacing:1px;white-space:nowrap;
    box-shadow:0 2px 6px rgba(0,0,0,.18);
    display:flex;align-items:center;gap:4px;}
  .res-badge{border-radius:10px;padding:6px 12px;
    font-weight:700;font-size:13px;letter-spacing:1px;
    box-shadow:0 1px 5px rgba(0,0,0,.15);}
  .penalty-badge{background:linear-gradient(135deg,#ff9800,#f57c00);color:#fff;
    border-radius:8px;padding:4px 10px;font-weight:700;font-size:11px;
    display:flex;align-items:center;gap:4px;letter-spacing:.5px;white-space:nowrap;}

  .chip{padding:5px 13px;border-radius:30px;border:2px solid;font-size:12px;font-weight:700;
    transition:all .15s;letter-spacing:.3px;}
  .chip-on{border-color:#ffd700;background:#ffd700;color:#0d3b1e;box-shadow:0 2px 10px rgba(255,215,0,.4);}
  .chip-off{border-color:#2d6a40;background:transparent;color:#a8d5b8;}
  .chip-off:hover{border-color:#4a9a60;color:#d0f0d8;}

  .date-label{color:#ffd700;font-weight:700;font-size:12px;
    letter-spacing:2px;margin-bottom:8px;padding-left:4px;
    display:flex;align-items:center;gap:6px;
    text-transform:uppercase;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;}

  .loading-spinner{animation:spin 1s linear infinite;}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

  .mm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:20px;}
  .mm-card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 4px 16px rgba(0,0,0,.3);overflow:hidden;}
  .mm-label{color:#6db882;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
  .mm-teams{display:flex;align-items:stretch;gap:0;min-height:100px;}
  .mm-team{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:12px;background:#f9f9f9;border-radius:8px;transition:all .2s;}
  .mm-team-flag{width:100%;height:60px;margin-bottom:8px;object-fit:contain;border-radius:6px;}
  .mm-team-name{color:#1a2e1d;font-weight:700;font-size:12px;text-align:center;line-height:1.2;}
  .mm-vs{display:flex;align-items:center;justify-content:center;color:#ccc;font-weight:700;font-size:12px;padding:0 6px;}
  .mm-time{color:#999;font-size:11px;margin-top:10px;text-align:center;}
  .mm-placar{margin-top:12px;padding:10px;background:linear-gradient(135deg,#0a2e17,#1a5c30);
    border-radius:8px;text-align:center;color:#ffd700;font-weight:800;font-size:18px;letter-spacing:1px;}
  
  .mm-team.winner{background:linear-gradient(135deg,#d4edda,#c3e6cb);color:#155724;}
  .mm-team.winner .mm-team-name{color:#155724;}
  .mm-team.loser{background:#e8e8e8;opacity:.6;}
  .mm-team.loser .mm-team-name{color:#666;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const MEDALS = ["🥇","🥈","🥉"];

const RES_STYLE = {
  A:{bg:"rgba(30,90,160,0.62)",color:"#dce8f8",label:"Vitória Casa"},
  E:{bg:"rgba(180,75,10,0.60)",color:"#f5dcc8",label:"Empate"},
  B:{bg:"rgba(90,30,130,0.60)",color:"#e8d4f5",label:"Vitória Visitante"},
};

const PAISES_CODIGOS = {
  "África do Sul": "za", "Alemanha": "de", "Argélia": "dz", "Argentina": "ar", "Áustria": "at",
  "Austrália": "au", "Arábia Saudita": "sa", "Bélgica": "be", "Brasil": "br", "Bósnia e Herzeg.": "ba",
  "Canadá": "ca", "Cabo Verde": "cv", "Catar": "qa", "Colômbia": "co", "Coreia do Sul": "kr",
  "Costa do Marfim": "ci", "Costa Rica": "cr", "Croácia": "hr", "Curaçao": "cw", "Dinamarca": "dk",
  "Egito": "eg", "Equador": "ec", "Escócia": "gb-sct", "Espanha": "es", "Estados Unidos": "us",
  "Eslováquia": "sk", "Eslovênia": "si", "Essuatíni": "sz", "Estônia": "ee", "Finlândia": "fi",
  "França": "fr", "Gana": "gh", "Geórgia": "ge", "Grécia": "gr", "Groenlândia": "gl", "Haiti": "ht",
  "Holanda": "nl", "Honduras": "hn", "Hong Kong": "hk", "Hungria": "hu", "Índia": "in",
  "Inglaterra": "gb-eng", "Indonésia": "id", "Irã": "ir", "Iraque": "iq", "Irlanda": "ie",
  "Islândia": "is", "Israel": "il", "Itália": "it", "Jamaica": "jm", "Japão": "jp", "Jordânia": "jo",
  "Kazaquistão": "kz", "Letônia": "lv", "Líbano": "lb", "Lituânia": "lt", "Luxemburgo": "lu",
  "Macedônia": "mk", "Malásia": "my", "Malawi": "mw", "Maldivas": "mv", "Mali": "ml", "Malta": "mt",
  "Marrocos": "ma", "Maurício": "mu", "Maurilândia": "mr", "México": "mx", "Mianmar": "mm",
  "Moçambique": "mz", "Moldávia": "md", "Mônaco": "mc", "Mongólia": "mn", "Montenegro": "me",
  "Namíbia": "na", "Nepal": "np", "Nicarágua": "ni", "Nigéria": "ng", "Noruega": "no",
  "Nova Zelândia": "nz", "Omã": "om", "Países Baixos": "nl", "Paquistão": "pk", "Panamá": "pa",
  "Papua-Nova Guiné": "pg", "Paraguai": "py", "País de Gales": "gb-wls", "Peru": "pe", "Polônia": "pl",
  "Portugal": "pt", "Porto Rico": "pr", "Quênia": "ke", "República Checa": "cz", "República Dem. Congo": "cd",
  "Rep. Dem. Congo": "cd", "República Democrática do Congo": "cd", "República Dominicana": "do",
  "Reino Unido": "gb", "Romênia": "ro", "Rússia": "ru", "Ruanda": "rw", "Samoa": "ws", "San Marino": "sm",
  "Senegal": "sn", "Sérvia": "rs", "Singapura": "sg", "Síria": "sy", "Somália": "so", "Sri Lanka": "lk",
  "Suazilândia": "sz", "Sudão": "sd", "Sudão do Sul": "ss", "Suécia": "se", "Suíça": "ch", "Surinã": "sr",
  "Tailândia": "th", "Taiwan": "tw", "Tajiquistão": "tj", "Tanzânia": "tz", "Tchéquia": "cz", "Timor-Leste": "tl",
  "Togo": "tg", "Tonga": "to", "Trinidad e Tobago": "tt", "Tunísia": "tn", "Turquia": "tr", "Ucrânia": "ua",
  "Uganda": "ug", "Uruguai": "uy", "Uzbequistão": "uz", "Vaticano": "va", "Venezuela": "ve", "Vietnã": "vn",
  "Zâmbia": "zm", "Zimbábue": "zw",
};

const getFlagUrl = (pais) => {
  const codigo = PAISES_CODIGOS[pais] || "xx";
  return `https://flagcdn.com/w160/${codigo}.webp`;
};

function App() {
  const [page, setPage]   = useState("home");
  const [subPage, setSubPage] = useState("grupos");
  const [data, setData]   = useState(null);
  const [err,  setErr]    = useState(null);
  const [hl,   setHl]     = useState(null);
  const [onlyG,setOnlyG]  = useState(true);
  const [ts,   setTs]     = useState(Date.now());

  useEffect(() => {
    fetch("results.json?t=" + ts)
      .then(r => { if(!r.ok) throw new Error("Arquivo não encontrado"); return r.json(); })
      .then(setData)
      .catch(e => setErr(e.message));
  }, [ts]);

  const ranking = useMemo(() => {
    if (!data) return [];
    return data.participants.map(name => {
      let pts = 0;
      data.games.forEach(g => {
        if (g.resultado && (g.guesses[name]||"") === g.resultado) pts++;
      });
      return { name, pts };
    }).sort((a,b) => b.pts - a.pts || a.name.localeCompare(b.name));
  }, [data]);

  const grouped = useMemo(() => {
    if (!data) return { order:[], map:{} };
    const map={}, order=[];
    let cur="";
    data.games.forEach(g => {
      if(g.date) cur=g.date;
      const d=cur||"—";
      if(!map[d]){map[d]=[];order.push(d);}
      map[d].push(g);
    });
    return { order, map };
  }, [data]);

  const gamesShown = useMemo(() => {
    if(!data) return [];
    return onlyG ? data.games.filter(g=>Object.values(g.guesses).some(v=>v)) : data.games;
  },[data,onlyG]);

  const gCls = (g,r) => !g?"g-non":!r?"g-wai":g===r?"g-hit":"g-mis";
  const gLbl = (g,r) => !g?"–":!r?g:g===r?`${g}✓`:`${g}✗`;

  const playedOrg = data ? data.games.filter(g=>g.sheet==="ORGANIZAÇÃO"&&g.resultado).length : 0;
  const totalOrg  = data ? data.games.filter(g=>g.sheet==="ORGANIZAÇÃO").length : 0;
  const playedMM  = data ? data.games.filter(g=>g.sheet==="MATA-MATA 32"&&g.resultado).length : 0;
  const totalMM   = data ? data.games.filter(g=>g.sheet==="MATA-MATA 32").length : 0;
  const played    = playedOrg + playedMM;
  const total     = totalOrg + totalMM;

  const getWinner = (game) => {
    if (!game.resultado && (game.gols_a === "" || game.gols_b === "")) return null;
    if (game.resultado === "A") return 0;
    if (game.resultado === "B") return 1;
    if (game.resultado === "E") return 2;
    return null;
  };

  if (!data && !err) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16,color:"#ffd700"}}>
      <div style={{fontSize:64}} className="loading-spinner">⚽</div>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,letterSpacing:3}}>Carregando…</div>
    </div>
  );

  if (err) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:14,padding:24,textAlign:"center"}}>
      <div style={{fontSize:52}}>⚠️</div>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:"#ffd700",letterSpacing:2}}>Erro ao sincronizar</div>
    </div>
  );

  if (page==="home") return (
    <div className="home-bg">
      <div style={{textAlign:"center",marginBottom:48,position:"relative",zIndex:1}}>
        <div style={{fontSize:72,marginBottom:8,filter:"drop-shadow(0 4px 16px rgba(255,215,0,.5))"}}>🏆</div>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:56,letterSpacing:6,color:"#ffd700",textShadow:"0 4px 24px rgba(255,215,0,.4), 0 0 60px rgba(255,215,0,.2)",lineHeight:1}}>Bolão Copa</div>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:38,letterSpacing:8,color:"#fff",opacity:.7,marginTop:2}}>2026</div>
        <div style={{marginTop:12,color:"#6db882",fontSize:13,fontWeight:600,letterSpacing:1}}>⚽ {played}/{total} jogos apurados &nbsp;·&nbsp; {data.participants.length} participantes</div>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:16,width:"100%",maxWidth:420,position:"relative",zIndex:1}}>
        <button className="home-btn btn-ranking" onClick={()=>setPage("ranking")}>
          <span className="home-btn-icon">🏆</span>
          <div>
            <div className="home-btn-label">Ranking</div>
            <div className="home-btn-sub">Veja quem está na liderança</div>
          </div>
        </button>
        <button className="home-btn btn-palpites" onClick={()=>{setPage("palpites"); setSubPage("grupos");}}>
          <span className="home-btn-icon">📋</span>
          <div>
            <div className="home-btn-label">Palpites</div>
            <div className="home-btn-sub">Confira o que cada um votou</div>
          </div>
        </button>
        <button className="home-btn btn-jogos" onClick={()=>{setPage("jogos"); setSubPage("grupos");}}>
          <span className="home-btn-icon">⚽</span>
          <div>
            <div className="home-btn-label">Placares</div>
            <div className="home-btn-sub">Resultados dos jogos</div>
          </div>
        </button>
      </div>

      <div style={{marginTop:32,color:"#3a6b48",fontSize:11,letterSpacing:1,position:"relative",zIndex:1}}>
        Atualizado automaticamente via planilha Excel
      </div>
    </div>
  );

  const Header = () => (
    <div className="app-header">
      <div style={{maxWidth:1100,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
          <button onClick={()=>setPage("home")} style={{background:"transparent",border:"none",color:"#ffd700",fontSize:22,cursor:"pointer",padding:"0 4px",lineHeight:1}} title="Início">⬅</button>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,color:"#ffd700",letterSpacing:3}}>Bolão Copa 2026</span>
          <span style={{marginLeft:"auto",color:"#6db882",fontSize:12}}>⚽ {played}/{total} apurados</span>
          <button onClick={()=>setTs(Date.now())} title="Recarregar" style={{background:"rgba(255,255,255,.05)",border:"1px solid #2d6a40",color:"#a8d5b8",borderRadius:8,padding:"5px 10px",fontSize:12,display:"flex",alignItems:"center",gap:4}}>🔄</button>
        </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap",overflowX:"auto"}}>
          {[["ranking","🏆 Ranking"],["palpites","📋 Palpites"],["jogos","⚽ Placares"]].map(([k,l])=>(
            <button key={k} onClick={()=>{setPage(k);if(k!=="ranking")setSubPage("grupos");}}
              className={`nav-btn ${page===k?"active":"inactive"}`}>{l}</button>
          ))}
        </div>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#071c0e"}}>
      <Header/>
      <div style={{maxWidth:1100,margin:"0 auto",padding:"22px 14px 60px"}}>

        {page==="ranking" && (
          <div style={{maxWidth:580}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,color:"#ffd700",letterSpacing:3,marginBottom:18,textShadow:"0 2px 12px rgba(255,215,0,.3)"}}>🏆 Classificação Geral</div>
            <div className="rank-table">
              <div className="rank-head">
                <div style={{textAlign:"center"}}>#</div>
                <div>PARTICIPANTE</div>
                <div style={{textAlign:"center"}}>ACERTOS</div>
                <div style={{textAlign:"center"}}>PONTOS</div>
              </div>
              {ranking.map((p,i)=>{
                const isTop=i<3&&p.pts>0;
                let pos=i+1;for(let j=0;j<i;j++)if(ranking[j].pts===p.pts){pos=j+1;break;}
                return (
                  <div key={p.name} className="rank-row" style={{background:i%2===0?"#f9fbf9":"#fff"}}>
                    <div className="rank-pos" style={{fontSize:isTop?22:15,fontWeight:800,color:isTop?"#0d3b1e":"#9aaa9e"}}>
                      {isTop?MEDALS[i]:`${pos}º`}
                    </div>
                    <div style={{fontWeight:isTop?800:600,fontSize:15,color:"#1a2e1d"}}>{p.name}</div>
                    <div style={{textAlign:"center",fontSize:14,fontWeight:700,color:"#3d7a4e"}}>{p.pts}</div>
                    <div style={{textAlign:"center"}}>
                      <span className="pts-badge" style={{background:p.pts>0?"linear-gradient(135deg,#0a2e17,#1a6030)":"#e8f0ea",color:p.pts>0?"#ffd700":"#8a9a8e"}}>{p.pts}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {page==="palpites" && (
          <div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,color:"#ffd700",letterSpacing:3,marginBottom:16,textShadow:"0 2px 12px rgba(255,915,0,.3)"}}>📋 Palpites</div>
            
            <div className="sub-nav">
              <button className={`sub-nav-btn ${subPage==="grupos"?"active":""}`} onClick={()=>setSubPage("grupos")}>📊 Fase de Grupos</button>
              <button className={`sub-nav-btn ${subPage==="matamata"?"active":""}`} onClick={()=>setSubPage("matamata")}>🔴 Mata-Mata</button>
            </div>

            {subPage==="grupos" && (
              <>
                <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:12,alignItems:"center"}}>
                  <span style={{color:"#6db882",fontSize:12,fontWeight:700,letterSpacing:.5,whiteSpace:"nowrap"}}>DESTACAR:</span>
                  <button className={`chip ${!hl?"chip-on":"chip-off"}`} onClick={()=>setHl(null)}>Todos</button>
                  {data.participants.map(p=>(
                    <button key={p} className={`chip ${hl===p?"chip-on":"chip-off"}`}
                      onClick={()=>setHl(hl===p?null:p)}>{p}</button>
                  ))}
                </div>

                <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",color:"#a8d5b8",fontSize:13,marginBottom:14,fontWeight:600}}>
                  <input type="checkbox" checked={onlyG} onChange={e=>setOnlyG(e.target.checked)}
                    style={{width:15,height:15,cursor:"pointer",accentColor:"#ffd700"}}/>
                  Exibir apenas jogos com palpites
                </label>

                <div className="pt-wrap">
                  <table className="pt">
                    <thead><tr>
                      <th className="cj">JOGO</th>
                      <th className="cr">PLACAR</th>
                      {data.participants.map(p=>(
                        <th key={p} onClick={()=>setHl(hl===p?null:p)} title={`Destacar ${p}`} style={{minWidth:36,textAlign:"center",cursor:"pointer",background:hl===p?"#1a4a28":undefined,color:hl===p?"#ffd700":undefined,transition:"background .15s"}}>
                          {p.includes(" ")?<>{p.split(" ")[0]}<br/><span style={{fontSize:10,opacity:.8}}>{p.split(" ").slice(1).join(" ")}</span></>:p}
                        </th>
                      ))}
                    </tr></thead>
                    <tbody>
                      {(()=>{
                        let lastD="";
                        return gamesShown.filter(g=>g.sheet==="ORGANIZAÇÃO").map(game=>{
                          const showDate=game.date&&game.date!==lastD;
                          if(game.date)lastD=game.date;
                          const r=game.resultado;
                          const rs=r?RES_STYLE[r]:null;
                          const placar=game.gols_a!==""&&game.gols_b!==""?`${game.gols_a}–${game.gols_b}`:"";
                          return (
                            <tr key={game.id}>
                              <td className="cj">
                                {showDate&&<div style={{fontSize:10,fontWeight:800,color:"#3d7a4e",letterSpacing:1,marginBottom:3}}>📅 {game.date}/2026</div>}
                                {game.match}
                              </td>
                              <td className="cr">
                                {placar&&rs?<span style={{background:rs.bg,color:rs.color,borderRadius:8,padding:"3px 9px",fontWeight:800,fontSize:13,whiteSpace:"nowrap"}}>{placar}</span>:<span style={{color:"#ccc",fontSize:11}}>—</span>}
                              </td>
                              {data.participants.map(p=>{
                                const guess=(game.guesses||{})[p]||"";
                                return (
                                  <td key={p} className={`gc ${gCls(guess,r)}`} style={hl===p?{outline:"2px solid #ffd700",outlineOffset:"-2px"}:{}}>
                                    {gLbl(guess,r)}
                                  </td>
                                );
                              })}
                            </tr>
                          );
                        });
                      })()}
                    </tbody>
                  </table>
                </div>
              </>
            )}

            {subPage==="matamata" && (
              <>
                <div style={{color:"#6db882",fontSize:12,fontWeight:600,marginBottom:14,letterSpacing:.5}}>
                  Mata-Mata: Acompanhe os palpites e resultados das eliminatórias
                </div>

                <div className="pt-wrap">
                  <table className="pt">
                    <thead><tr>
                      <th className="cj">JOGO</th>
                      <th className="cr">PLACAR</th>
                      {data.participants.map(p=>(
                        <th key={p} onClick={()=>setHl(hl===p?null:p)} title={`Destacar ${p}`} style={{minWidth:36,textAlign:"center",cursor:"pointer",background:hl===p?"#1a4a28":undefined,color:hl===p?"#ffd700":undefined,transition:"background .15s"}}>
                          {p.includes(" ")?<>{p.split(" ")[0]}<br/><span style={{fontSize:10,opacity:.8}}>{p.split(" ").slice(1).join(" ")}</span></>:p}
                        </th>
                      ))}
                    </tr></thead>
                    <tbody>
                      {data.games.filter(g=>g.sheet==="MATA-MATA 32").map((game,idx)=>{
                        const r=game.resultado;
                        const rs=r?RES_STYLE[r]:null;
                        const placar=game.gols_a!==""&&game.gols_b!==""?`${game.gols_a}–${game.gols_b}`:"";
                        const times = game.match.split(" x ");
                        const timeA = times[0]?.trim() || "";
                        const timeB = times[1]?.trim() || "";
                        const passou = game.passou || "";
                        const isPenalties = game.penalties || false;
                        
                        return (
                          <tr key={game.id}>
                            <td className="cj" style={{background:passou?'#d4edda':'#f5f9f5'}}>
                              <div style={{fontSize:10,fontWeight:800,color:"#3d7a4e",letterSpacing:1,marginBottom:3}}>PARTIDA {idx+1}</div>
                              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                                <span style={{color:passou===timeA?"#155724":"#1a2e1d",fontWeight:passou===timeA?800:600}}>{timeA}</span>
                                <span style={{fontSize:11,color:"#666"}}>vs</span>
                                <span style={{color:passou===timeB?"#155724":"#1a2e1d",fontWeight:passou===timeB?800:600}}>{timeB}</span>
                              </div>
                              {passou && <div style={{marginTop:8,padding:6,background:"#155724",color:"#fff",borderRadius:6,fontSize:10,fontWeight:700,textAlign:"center"}}>✅ {passou}</div>}
                            </td>
                            <td className="cr" style={{background:passou?'#d4edda':'#f5f9f5'}}>
                              {placar&&rs?<span style={{background:rs.bg,color:rs.color,borderRadius:8,padding:"3px 9px",fontWeight:800,fontSize:13,whiteSpace:"nowrap"}}>{placar}</span>:<span style={{color:"#ccc",fontSize:11}}>—</span>}
                            </td>
                            {data.participants.map(p=>{
                              const guess=(game.guesses||{})[p]||"";
                              return (
                                <td key={p} className={`gc ${gCls(guess,r)}`} style={{...{hl===p?{outline:"2px solid #ffd700",outlineOffset:"-2px"}:{}},background:passou?'#d4edda':'inherit'}}>
                                  {gLbl(guess,r)}
                                </td>
                              );
                            })}
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </>
            )}
          </div>
        )}

        {page==="jogos" && (
          <div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,color:"#ffd700",letterSpacing:3,marginBottom:16,textShadow:"0 2px 12px rgba(255,215,0,.3)"}}>⚽ Placares</div>
            
            <div className="sub-nav">
              <button className={`sub-nav-btn ${subPage==="grupos"?"active":""}`} onClick={()=>setSubPage("grupos")}>📊 Fase de Grupos</button>
              <button className={`sub-nav-btn ${subPage==="matamata"?"active":""}`} onClick={()=>setSubPage("matamata")}>🔴 Mata-Mata</button>
            </div>

            {subPage==="grupos" && (
              <>
                {grouped.order.map(date=>{
                  const games=grouped.map[date].filter(g=>g.sheet==="ORGANIZAÇÃO");
                  if(games.length===0) return null;
                  return (
                    <div key={date} style={{marginBottom:22}}>
                      <div className="date-label">📅 {date}/2026</div>
                      <div className="jogos-card">
                        {games.map((game,gi)=>{
                          const r=game.resultado;
                          const rs=r?RES_STYLE[r]:null;
                          const placar=game.gols_a!==""&&game.gols_b!==""?`${game.gols_a} – ${game.gols_b}`:"";
                          return (
                            <div key={game.id}>
                              {gi>0&&<div className="jogo-sep"/>}
                              <div className="jogo-row">
                                <div className="jogo-match">{game.match}</div>
                                {placar&&rs?<div style={{display:"flex",alignItems:"center",gap:8}}>
                                  <span className="placar-badge" style={{background:rs.bg}}>{placar}</span>
                                  <span className="res-badge" style={{background:rs.bg,color:rs.color}}>{r}</span>
                                </div>:<span style={{color:"#bbb",fontSize:13}}>Aguardando</span>}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </>
            )}

            {subPage==="matamata" && (
              <>
                <div className="jogos-card">
                  {data.games.filter(g=>g.sheet==="MATA-MATA 32").map((game,idx)=>{
                    const times = game.match.split(" x ");
                    const timeA = times[0]?.trim() || "";
                    const timeB = times[1]?.trim() || "";
                    const passou = game.passou || "";
                    const isPenalties = game.penalties || false;
                    const r=game.resultado;
                    const rs=r?RES_STYLE[r]:null;
                    const placar=game.gols_a!==""&&game.gols_b!==""?`${game.gols_a} – ${game.gols_b}`:"";
                    return (
                      <div key={game.id}>
                        {idx>0&&<div className="jogo-sep"/>}
                        <div className={`jogo-row ${game.penalties?"penalties":""}`} style={{background:passou?"#d4edda":"inherit"}}>
                          <div style={{flex:1}}>
                            <div style={{fontSize:10,fontWeight:800,color:"#3d7a4e",letterSpacing:1,marginBottom:4}}>PARTIDA {idx+1}</div>
                            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                              <span style={{flex:1,color:passou===timeA?"#155724":"#1a2e1d",fontWeight:passou===timeA?800:600}}>{timeA}</span>
                              <span style={{color:"#ccc",fontSize:12}}>vs</span>
                              <span style={{flex:1,textAlign:'right',color:passou===timeB?"#155724":"#1a2e1d",fontWeight:passou===timeB?800:600}}>{timeB}</span>
                            </div>
                            {passou && <div style={{padding:6,background:"#155724",color:"#fff",borderRadius:6,fontSize:11,fontWeight:700,textAlign:"center"}}>✅ Classificado: {passou}</div>}
                          </div>
                          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
                            {placar&&rs?<div style={{display:"flex",alignItems:"center",gap:4}}>
                              <span className="placar-badge" style={{background:rs.bg}}>{placar}</span>
                              <span className="res-badge" style={{background:rs.bg,color:rs.color}}>{r}</span>
                            </div>:<span style={{color:"#bbb",fontSize:13}}>Aguardando</span>}
                            {isPenalties&&<span className="penalty-badge">⚽ Pênaltis</span>}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
