<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Bolão Copa 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d3b1e;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;min-height:100vh}
  button{cursor:pointer;font-family:inherit}
  ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:#0d3b1e} ::-webkit-scrollbar-thumb{background:#2d6a40;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

/* ─── RESULTADOS DA PLANILHA (coluna RESULTADO) ─────────────────────────── */
/* Edite aqui ou use os botões A/E/B na aba Jogos — salvo automaticamente   */
const RESULTADOS_PLANILHA = {
  0:"A", 1:"A", 2:"E", 3:"A", 4:"E",
  5:"E", 6:"B", 7:"A", 8:"A", 9:"A",
  10:"E", 11:"A"
};

const PARTICIPANTS = [
  "Alex","Bonfim","Christian","Cleiton","Daniel","David","Douglas","Dunga",
  "Felipe","Gabriel","Giliarde","Gustavo","Gustavo Lima","Heitor","Juninho",
  "Leonardo","Patrick","Rasta","Renan","Sanches"
];

const GAMES = [
  {id:0,  date:"11/06", match:"México x África do Sul",         g:["A","B","A","A","A","A","A","A","A","A","A","E","A","A","A","A","A","E","B","A"]},
  {id:1,  date:"11/06", match:"Coreia do Sul x Tchéquia",       g:["E","A","A","A","A","A","A","A","B","B","B","A","E","B","E","A","A","A","A","B"]},
  {id:2,  date:"12/06", match:"Canadá x Bósnia e Herzeg.",      g:["A","E","B","E","A","A","A","A","A","A","A","A","A","B","A","A","A","A","B","B"]},
  {id:3,  date:"12/06", match:"Estados Unidos x Paraguai",      g:["B","B","B","A","E","A","B","A","B","A","E","B","B","E","A","B","A","B","B","A"]},
  {id:4,  date:"13/06", match:"Catar x Suíça",                  g:["B","B","B","B","B","B","B","B","B","B","A","B","B","B","B","B","B","B","B","B"]},
  {id:5,  date:"13/06", match:"Brasil x Marrocos",              g:["A","A","A","B","A","A","A","E","E","A","A","A","A","A","A","A","A","A","A","A"]},
  {id:6,  date:"13/06", match:"Haiti x Escócia",                g:["A","A","B","B","B","B","B","B","B","B","B","B","B","B","B","B","B","A","B","B"]},
  {id:7,  date:"13/06", match:"Austrália x Turquia",            g:["A","B","B","B","B","B","B","B","B","B","A","A","B","B","B","B","B","A","B","B"]},
  {id:8,  date:"14/06", match:"Alemanha x Curaçao",             g:["A","A","A","A","A","A","A","A","A","A","A","A","A","A","A","A","A",null,"A","A"]},
  {id:9,  date:"14/06", match:"Costa do Marfim x Equador",      g:["A","E","A","E","E","B","E","B","B","A","A","E","B","B","A","E","B","B","A","B"]},
  {id:10, date:"14/06", match:"Países Baixos x Japão",          g:["A","B","E","A","B","A","A","A","A","B","B","A","A","E","B","B","E","A","A","A"]},
  {id:11, date:"14/06", match:"Suécia x Tunísia",               g:["E","A","A","A","A","B","A","A","E","A","B","E","A","A","A","E","A","A","A","A"]},
  {id:12, date:"15/06", match:"Bélgica x Egito",                g:[]},
  {id:13, date:"15/06", match:"Irã x Nova Zelândia",            g:[]},
  {id:14, date:"15/06", match:"Espanha x Cabo Verde",           g:[]},
  {id:15, date:"15/06", match:"Arábia Saudita x Uruguai",       g:[]},
  {id:16, date:"16/06", match:"França x Senegal",               g:[]},
  {id:17, date:"16/06", match:"Iraque x Noruega",               g:[]},
  {id:18, date:"16/06", match:"Argentina x Argélia",            g:[]},
  {id:19, date:"16/06", match:"Áustria x Jordânia",             g:[]},
  {id:20, date:"17/06", match:"Portugal x Rep. Dem. Congo",     g:[]},
  {id:21, date:"17/06", match:"Uzbequistão x Colômbia",         g:[]},
  {id:22, date:"17/06", match:"Inglaterra x Croácia",           g:[]},
  {id:23, date:"17/06", match:"Gana x Panamá",                  g:[]},
  {id:24, date:"18/06", match:"Tchéquia x África do Sul",       g:[]},
  {id:25, date:"18/06", match:"México x Coreia do Sul",         g:[]},
  {id:26, date:"18/06", match:"Suíça x Bósnia e Herzeg.",       g:[]},
  {id:27, date:"18/06", match:"Canadá x Catar",                 g:[]},
  {id:28, date:"19/06", match:"Escócia x Marrocos",             g:[]},
  {id:29, date:"19/06", match:"Brasil x Haiti",                 g:[]},
  {id:30, date:"19/06", match:"Estados Unidos x Austrália",     g:[]},
  {id:31, date:"19/06", match:"Turquia x Paraguai",             g:[]},
  {id:32, date:"20/06", match:"Alemanha x Costa do Marfim",     g:[]},
  {id:33, date:"20/06", match:"Equador x Curaçao",              g:[]},
  {id:34, date:"20/06", match:"Países Baixos x Suécia",         g:[]},
  {id:35, date:"20/06", match:"Tunísia x Japão",                g:[]},
  {id:36, date:"21/06", match:"Bélgica x Irã",                  g:[]},
  {id:37, date:"21/06", match:"Nova Zelândia x Egito",          g:[]},
  {id:38, date:"21/06", match:"Espanha x Arábia Saudita",       g:[]},
  {id:39, date:"21/06", match:"Uruguai x Cabo Verde",           g:[]},
  {id:40, date:"22/06", match:"França x Iraque",                g:[]},
  {id:41, date:"22/06", match:"Noruega x Senegal",              g:[]},
  {id:42, date:"22/06", match:"Argentina x Áustria",            g:[]},
  {id:43, date:"22/06", match:"Jordânia x Argélia",             g:[]},
  {id:44, date:"23/06", match:"Portugal x Uzbequistão",         g:[]},
  {id:45, date:"23/06", match:"Colômbia x Rep. Dem. Congo",     g:[]},
  {id:46, date:"23/06", match:"Inglaterra x Gana",              g:[]},
  {id:47, date:"23/06", match:"Panamá x Croácia",               g:[]},
  {id:48, date:"24/06", match:"África do Sul x Coreia do Sul",  g:[]},
  {id:49, date:"24/06", match:"Tchéquia x México",              g:[]},
  {id:50, date:"24/06", match:"Suíça x Canadá",                 g:[]},
  {id:51, date:"24/06", match:"Bósnia e Herzeg. x Catar",       g:[]},
  {id:52, date:"24/06", match:"Marrocos x Haiti",               g:[]},
  {id:53, date:"24/06", match:"Escócia x Brasil",               g:[]},
  {id:54, date:"25/06", match:"Turquia x Estados Unidos",       g:[]},
  {id:55, date:"25/06", match:"Paraguai x Austrália",           g:[]},
  {id:56, date:"25/06", match:"Curaçao x Costa do Marfim",      g:[]},
  {id:57, date:"25/06", match:"Equador x Alemanha",             g:[]},
  {id:58, date:"25/06", match:"Tunísia x Países Baixos",        g:[]},
  {id:59, date:"25/06", match:"Japão x Suécia",                 g:[]},
  {id:60, date:"26/06", match:"Nova Zelândia x Bélgica",        g:[]},
  {id:61, date:"26/06", match:"Egito x Irã",                    g:[]},
  {id:62, date:"26/06", match:"Cabo Verde x Arábia Saudita",    g:[]},
  {id:63, date:"26/06", match:"Uruguai x Espanha",              g:[]},
  {id:64, date:"26/06", match:"Noruega x França",               g:[]},
  {id:65, date:"26/06", match:"Senegal x Iraque",               g:[]},
  {id:66, date:"27/06", match:"Argélia x Áustria",              g:[]},
  {id:67, date:"27/06", match:"Jordânia x Argentina",           g:[]},
  {id:68, date:"27/06", match:"Colômbia x Portugal",            g:[]},
  {id:69, date:"27/06", match:"Rep. Dem. Congo x Uzbequistão",  g:[]},
  {id:70, date:"27/06", match:"Panamá x Inglaterra",            g:[]},
  {id:71, date:"27/06", match:"Croácia x Gana",                 g:[]},
];

const MEDALS = ["🥇","🥈","🥉"];
const STORAGE_KEY = "bolao2026-results";

function App() {
  const [tab, setTab] = useState("ranking");
  const [results, setResults] = useState({ ...RESULTADOS_PLANILHA });
  const [editGame, setEditGame] = useState(null);
  const [saved, setSaved] = useState(false);

  /* Carrega do localStorage na abertura */
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const stored = JSON.parse(raw);
        /* Mantém resultados da planilha como base, sobrescreve com salvos */
        setResults({ ...RESULTADOS_PLANILHA, ...stored });
      }
    } catch(_) {}
  }, []);

  const setResult = (gameId, val) => {
    setResults(prev => {
      const next = { ...prev, [gameId]: val };
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); } catch(_) {}
      setSaved(true);
      setTimeout(() => setSaved(false), 1500);
      return next;
    });
  };

  const ranking = useMemo(() => {
    return PARTICIPANTS.map((name, pi) => {
      let pts = 0;
      GAMES.forEach(g => {
        const res = results[g.id];
        const guess = g.g[pi];
        if (res && guess && guess === res) pts++;
      });
      return { name, pts };
    }).sort((a,b) => b.pts - a.pts || a.name.localeCompare(b.name));
  }, [results]);

  const played = GAMES.filter(g => results[g.id]).length;

  /* Agrupa jogos por data */
  const grouped = {};
  GAMES.forEach(g => { (grouped[g.date] = grouped[g.date] || []).push(g); });

  return (
    <div style={{minHeight:"100vh",background:"#0d3b1e"}}>

      {/* ── HEADER ── */}
      <div style={{background:"linear-gradient(135deg,#0a2e17 0%,#1a5c30 60%,#0a2e17 100%)",
                   borderBottom:"3px solid #ffd700",padding:"18px 16px 0"}}>
        <div style={{maxWidth:720,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:4}}>
            <span style={{fontSize:38}}>🏆</span>
            <div>
              <div style={{fontSize:22,fontWeight:900,color:"#ffd700",letterSpacing:1}}>BOLÃO DA COPA 2026</div>
              <div style={{fontSize:11,color:"#a8d5b8",letterSpacing:3}}>RANKING AO VIVO</div>
            </div>
            {saved && <span style={{marginLeft:"auto",background:"#ffd700",color:"#0d3b1e",
              padding:"4px 12px",borderRadius:20,fontSize:12,fontWeight:700}}>✓ Salvo</span>}
          </div>
          <div style={{fontSize:12,color:"#a8d5b8",marginBottom:12,paddingLeft:4}}>
            ⚽ {played}/{GAMES.length} jogos apurados &nbsp;|&nbsp; 👥 {PARTICIPANTS.length} participantes
          </div>
          <div style={{display:"flex",gap:0}}>
            {[["ranking","🏆 Ranking"],["jogos","⚽ Jogos"]].map(([k,l]) => (
              <button key={k} onClick={()=>setTab(k)} style={{
                background:tab===k?"#ffd700":"transparent",
                color:tab===k?"#0d3b1e":"#a8d5b8",
                border:"none",borderRadius:"8px 8px 0 0",
                padding:"10px 24px",fontWeight:700,fontSize:14,transition:"all .2s"
              }}>{l}</button>
            ))}
          </div>
        </div>
      </div>

      {/* ── CONTEÚDO ── */}
      <div style={{maxWidth:720,margin:"0 auto",padding:"18px 12px 60px"}}>

        {/* RANKING */}
        {tab==="ranking" && (
          <div>
            {played===0 && (
              <div style={{background:"rgba(255,215,0,.1)",border:"1px solid #ffd70044",
                borderRadius:10,padding:14,marginBottom:16,color:"#ffd700",fontSize:14,textAlign:"center"}}>
                Nenhum resultado ainda. Vá em <strong>⚽ Jogos</strong> e informe os resultados!
              </div>
            )}
            <div style={{background:"#fff",borderRadius:12,overflow:"hidden",boxShadow:"0 4px 24px #0006"}}>
              <div style={{display:"grid",gridTemplateColumns:"50px 1fr 70px 80px",
                background:"#0a2e17",padding:"10px 16px",fontSize:12,
                fontWeight:700,color:"#ffd700",letterSpacing:1}}>
                <div style={{textAlign:"center"}}>#</div>
                <div>PARTICIPANTE</div>
                <div style={{textAlign:"center"}}>ACERTOS</div>
                <div style={{textAlign:"center"}}>PONTOS</div>
              </div>
              {ranking.map((p,i) => {
                const isTop = i < 3 && p.pts > 0;
                /* posição real (empate = mesma posição) */
                let pos = i+1;
                for(let j=0;j<i;j++) if(ranking[j].pts===p.pts){pos=j+1;break;}
                return (
                  <div key={p.name} style={{
                    display:"grid",gridTemplateColumns:"50px 1fr 70px 80px",
                    padding:"13px 16px",alignItems:"center",
                    background:i%2===0?"#f9fbf9":"#fff",borderBottom:"1px solid #e8f0ea"
                  }}>
                    <div style={{textAlign:"center",fontSize:isTop?20:15,
                      fontWeight:700,color:isTop?"#0d3b1e":"#8a9a8e"}}>
                      {isTop ? MEDALS[i] : `${pos}º`}
                    </div>
                    <div style={{fontWeight:isTop?700:500,fontSize:15,color:"#1a2e1d"}}>{p.name}</div>
                    <div style={{textAlign:"center",fontSize:14,color:"#3d7a4e"}}>{p.pts}</div>
                    <div style={{textAlign:"center"}}>
                      <span style={{
                        background:p.pts>0?"#0d3b1e":"#e8f0ea",
                        color:p.pts>0?"#ffd700":"#8a9a8e",
                        borderRadius:20,padding:"3px 16px",fontWeight:700,fontSize:14
                      }}>{p.pts} pt{p.pts!==1?"s":""}</span>
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{marginTop:10,color:"#a8d5b8",fontSize:12,textAlign:"center"}}>
              1 ponto por acerto · A = vitória time esquerdo · E = empate · B = vitória time direito
            </div>
          </div>
        )}

        {/* JOGOS */}
        {tab==="jogos" && (
          <div>
            <div style={{color:"#a8d5b8",fontSize:13,marginBottom:14,textAlign:"center",lineHeight:1.6}}>
              Clique no jogo para ver palpites · <strong style={{color:"#ffd700"}}>A</strong> = time esq. vence · <strong style={{color:"#ffd700"}}>E</strong> = empate · <strong style={{color:"#ffd700"}}>B</strong> = time dir. vence<br/>
              <span style={{fontSize:11,opacity:.7}}>Os resultados são salvos automaticamente no navegador</span>
            </div>

            {Object.entries(grouped).map(([date, games]) => (
              <div key={date} style={{marginBottom:18}}>
                <div style={{color:"#ffd700",fontWeight:700,fontSize:13,
                  letterSpacing:1,marginBottom:6,paddingLeft:4}}>📅 {date}/2026</div>
                <div style={{background:"#fff",borderRadius:10,overflow:"hidden",
                  boxShadow:"0 2px 14px #0005"}}>
                  {games.map((game,gi) => {
                    const res = results[game.id] || "";
                    const hasPalpites = game.g.length > 0;
                    const open = editGame === game.id;
                    return (
                      <div key={game.id}>
                        {gi>0 && <div style={{height:1,background:"#e8f0ea"}}/>}
                        <div onClick={()=>setEditGame(open?null:game.id)}
                          style={{padding:"11px 14px",cursor:"pointer",
                            background:open?"#f0f9f2":"transparent",transition:"background .15s"}}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <div style={{flex:1}}>
                              <div style={{fontSize:14,color:"#1a2e1d",fontWeight:500,lineHeight:1.3}}>
                                {game.match}
                              </div>
                              {!hasPalpites && (
                                <div style={{fontSize:11,color:"#bbb",marginTop:2}}>
                                  Sem palpites registrados
                                </div>
                              )}
                            </div>
                            {/* Botões A / E / B */}
                            <div style={{display:"flex",gap:5}}>
                              {["A","E","B"].map(opt => (
                                <button key={opt}
                                  onClick={e=>{e.stopPropagation(); setResult(game.id, res===opt?"":opt);}}
                                  style={{
                                    width:36,height:36,borderRadius:8,
                                    border:`2px solid ${res===opt?"#0d3b1e":"#ccc"}`,
                                    background:res===opt?"#0d3b1e":"#fff",
                                    color:res===opt?"#ffd700":"#666",
                                    fontWeight:700,fontSize:14,transition:"all .15s"
                                  }}>{opt}</button>
                              ))}
                            </div>
                            <span style={{color:"#aaa",fontSize:12,marginLeft:2}}>{open?"▲":"▼"}</span>
                          </div>
                        </div>

                        {/* Palpites expandidos */}
                        {open && hasPalpites && (
                          <div style={{background:"#f5faf6",borderTop:"1px solid #d4e8d8",padding:"10px 14px"}}>
                            <div style={{fontSize:11,color:"#555",marginBottom:8,fontWeight:700,letterSpacing:1}}>
                              PALPITES
                            </div>
                            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                              {PARTICIPANTS.map((name,pi) => {
                                const guess = game.g[pi];
                                if(!guess) return null;
                                const correct = res && guess === res;
                                const wrong   = res && guess !== res;
                                return (
                                  <span key={name} style={{
                                    padding:"4px 10px",borderRadius:20,fontSize:12,fontWeight:600,
                                    background:correct?"#0d3b1e":wrong?"#ffeaea":"#e8f0ea",
                                    color:correct?"#ffd700":wrong?"#c0392b":"#3d5a3e",
                                    border:`1px solid ${correct?"#ffd700":wrong?"#e74c3c":"#b8d4bf"}`
                                  }}>
                                    {name}: {guess} {correct?"✓":wrong?"✗":""}
                                  </span>
                                );
                              })}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
