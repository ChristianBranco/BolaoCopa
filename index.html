<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolão Copa 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #071c0e; font-family: 'Montserrat', sans-serif; color: #fff; }
    
    .header { background: #0a2e17; border-bottom: 3px solid #ffd700; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
    .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: #ffd700; letter-spacing: 2px; }
    .header-info { color: #6db882; font-size: 12px; }
    
    .nav-tabs { display: flex; gap: 5px; background: #0a2e17; padding: 0 20px 10px; border-bottom: 2px solid rgba(255,215,0,.2); }
    .nav-tab { padding: 10px 16px; font-weight: 700; font-size: 12px; border: none; background: transparent; color: #a8d5b8; cursor: pointer; transition: all .2s; border-radius: 8px 8px 0 0; }
    .nav-tab.active { background: #ffd700; color: #0d3b1e; }
    
    .sub-tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 2px solid rgba(255,255,255,.1); padding: 0 0 8px; flex-wrap: wrap; }
    .sub-tab { padding: 8px 14px; font-weight: 700; font-size: 11px; border: none; background: transparent; color: #a8d5b8; cursor: pointer; transition: all .2s; border-bottom: 3px solid transparent; }
    .sub-tab.active { color: #ffd700; border-bottom-color: #ffd700; }
    
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    
    .rank-table { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,.4); max-width: 700px; }
    .rank-header { display: grid; grid-template-columns: 50px 1fr 80px 100px; background: linear-gradient(90deg, #0a2e17, #1a5c30); padding: 12px; color: #ffd700; font-weight: 700; font-size: 11px; letter-spacing: 1px; }
    .rank-row { display: grid; grid-template-columns: 50px 1fr 80px 100px; padding: 14px; border-bottom: 1px solid #eee; align-items: center; color: #1a2e1d; }
    .rank-row:hover { background: #f5f5f5; }
    .rank-pos { text-align: center; font-weight: 700; }
    .rank-name { font-weight: 600; }
    .rank-points { text-align: center; font-weight: 800; color: #0d3b1e; }
    
    .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .game-card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 6px 24px rgba(0,0,0,.3); }
    .game-card.won { background: #d4edda; border-left: 4px solid #28a745; }
    .game-title { color: #6db882; font-size: 10px; font-weight: 800; letter-spacing: 1px; margin-bottom: 10px; }
    .game-teams { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .game-team { flex: 1; text-align: center; color: #1a2e1d; font-weight: 600; }
    .game-team.winner { color: #28a745; font-weight: 800; }
    .game-vs { color: #ccc; font-size: 12px; }
    .game-score { background: linear-gradient(135deg, #0a2e17, #1a5c30); color: #ffd700; padding: 10px; border-radius: 8px; text-align: center; font-weight: 800; font-size: 20px; margin-bottom: 10px; }
    .game-badge { display: inline-block; background: #ff9800; color: #fff; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; margin-right: 6px; }
    .game-badge.overtime { background: #2196F3; }
    .game-classified { background: #155724; color: #fff; padding: 8px; border-radius: 6px; font-size: 11px; font-weight: 700; text-align: center; }
    
    .loading { text-align: center; padding: 40px; color: #ffd700; font-size: 24px; }
    .error { background: #f8d7da; color: #721c24; padding: 20px; border-radius: 8px; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const MEDALS = ["🥇", "🥈", "🥉"];
    
    function App() {
      const [data, setData] = useState(null);
      const [page, setPage] = useState("ranking");
      const [mmPhase, setMmPhase] = useState("16");
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      useEffect(() => {
        fetch('results.json')
          .then(r => r.json())
          .then(d => { setData(d); setLoading(false); })
          .catch(e => { setError(e.message); setLoading(false); });
      }, []);

      if (loading) return <div className="container"><div className="loading">⚽ Carregando...</div></div>;
      if (error) return <div className="container"><div className="error">Erro: {error}</div></div>;
      if (!data) return <div className="container"><div className="error">Sem dados</div></div>;

      // Calcular ranking
      const ranking = useMemo(() => {
        return data.participants.map(name => {
          let pts = 0;
          data.games.forEach(g => {
            if (g.resultado && (g.guesses[name] || '') === g.resultado) pts++;
          });
          return { name, pts };
        }).sort((a,b) => b.pts - a.pts);
      }, [data]);

      // Mapear fases
      const phaseMap = {
        "16": "MATA-MATA 16",
        "8": "MATA-MATA 8",
        "4": "MATA-MATA 4",
        "2": "MATA-MATA 2",
        "3": "MATA-MATA 3º Lugar",
        "final": "MATA-MATA Final"
      };

      const getPhaseGames = (phase) => {
        const sheetName = phaseMap[phase];
        return data.games.filter(g => g.sheet === sheetName);
      };

      return (
        <div style={{minHeight: "100vh", background: "#071c0e"}}>
          <div className="header">
            <span className="header-title">⚽ BOLÃO COPA 2026</span>
            <span className="header-info">75/88 apurados</span>
          </div>

          <div className="nav-tabs">
            <button className={`nav-tab ${page==="ranking"?"active":""}`} onClick={()=>setPage("ranking")}>🏆 Ranking</button>
            <button className={`nav-tab ${page==="palpites"?"active":""}`} onClick={()=>setPage("palpites")}>📋 Palpites</button>
            <button className={`nav-tab ${page==="placares"?"active":""}`} onClick={()=>setPage("placares")}>⚽ Placares</button>
          </div>

          <div className="container">
            {page === "ranking" && (
              <div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif", fontSize:28, color:"#ffd700", marginBottom:20, letterSpacing:2}}>🏆 Ranking Geral</div>
                <div className="rank-table">
                  <div className="rank-header">
                    <div>#</div>
                    <div>Participante</div>
                    <div>Acertos</div>
                    <div>Pontos</div>
                  </div>
                  {ranking.map((p, i) => (
                    <div key={p.name} className="rank-row">
                      <div className="rank-pos">{i<3 ? MEDALS[i] : i+1}</div>
                      <div className="rank-name">{p.name}</div>
                      <div style={{textAlign:"center"}}>{p.pts}</div>
                      <div className="rank-points" style={{background:p.pts>0?"#d4edda":"#f5f5f5", color:p.pts>0?"#155724":"#999"}}>{p.pts}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {page === "palpites" && (
              <div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif", fontSize:28, color:"#ffd700", marginBottom:20, letterSpacing:2}}>📋 Palpites Mata-Mata</div>
                <div className="sub-tabs">
                  <button className={`sub-tab ${mmPhase==="16"?"active":""}`} onClick={()=>setMmPhase("16")}>16 Avos</button>
                  <button className={`sub-tab ${mmPhase==="8"?"active":""}`} onClick={()=>setMmPhase("8")}>Quartas</button>
                  <button className={`sub-tab ${mmPhase==="4"?"active":""}`} onClick={()=>setMmPhase("4")}>Semis</button>
                  <button className={`sub-tab ${mmPhase==="2"?"active":""}`} onClick={()=>setMmPhase("2")}>Final</button>
                  <button className={`sub-tab ${mmPhase==="3"?"active":""}`} onClick={()=>setMmPhase("3")}>3º Lugar</button>
                </div>
                
                <div style={{overflowX:"auto", borderRadius:12, boxShadow:"0 8px 40px rgba(0,0,0,.4)"}}>
                  <table style={{width:"100%", borderCollapse:"collapse", background:"#fff", minWidth:"800px"}}>
                    <thead>
                      <tr style={{background:"linear-gradient(90deg, #0a2e17, #1a5c30)"}}>
                        <th style={{padding:"12px 14px", textAlign:"left", color:"#ffd700", fontWeight:700, fontSize:11, letterSpacing:1}}>JOGO</th>
                        {data.participants.map(p => (
                          <th key={p} style={{padding:"12px 6px", textAlign:"center", color:"#ffd700", fontWeight:700, fontSize:10, whiteSpace:"nowrap"}}>{p.substring(0,3)}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {getPhaseGames(mmPhase).map((g, i) => (
                        <tr key={g.id} style={{borderBottom:"1px solid #eee"}}>
                          <td style={{padding:"10px 14px", fontWeight:600, fontSize:12, color:"#1a2e1d", background:g.passou?"#d4edda":"#f5f5f5"}}>
                            <div style={{fontSize:9, color:"#3d7a4e", fontWeight:800, marginBottom:3}}>PARTIDA {i+1}</div>
                            {g.match}
                          </td>
                          {data.participants.map(p => {
                            const guess = g.guesses[p] || '';
                            const isCorrect = guess && g.resultado && guess === g.resultado;
                            return (
                              <td key={p} style={{padding:"8px 4px", textAlign:"center", fontSize:11, fontWeight:700, background:isCorrect?"#d4edda":guess?"#fff3cd":"#f5f5f5", color:isCorrect?"#155724":guess?"#856404":"#999"}}>
                                {guess || "—"}
                              </td>
                            );
                          })}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {page === "placares" && (
              <div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif", fontSize:28, color:"#ffd700", marginBottom:20, letterSpacing:2}}>⚽ Placares Mata-Mata</div>
                <div className="sub-tabs">
                  <button className={`sub-tab ${mmPhase==="16"?"active":""}`} onClick={()=>setMmPhase("16")}>16 Avos</button>
                  <button className={`sub-tab ${mmPhase==="8"?"active":""}`} onClick={()=>setMmPhase("8")}>Quartas</button>
                  <button className={`sub-tab ${mmPhase==="4"?"active":""}`} onClick={()=>setMmPhase("4")}>Semis</button>
                  <button className={`sub-tab ${mmPhase==="2"?"active":""}`} onClick={()=>setMmPhase("2")}>Final</button>
                  <button className={`sub-tab ${mmPhase==="3"?"active":""}`} onClick={()=>setMmPhase("3")}>3º Lugar</button>
                </div>

                <div className="games-grid">
                  {getPhaseGames(mmPhase).map((g, i) => {
                    const times = g.match.split(" x ");
                    const timeA = times[0]?.trim() || "";
                    const timeB = times[1]?.trim() || "";
                    const score = g.gols_a && g.gols_b ? `${g.gols_a} × ${g.gols_b}` : "";
                    const winner = g.passou === timeA ? 0 : g.passou === timeB ? 1 : -1;

                    return (
                      <div key={g.id} className={`game-card ${g.passou?"won":""}`}>
                        <div className="game-title">PARTIDA {i+1}</div>
                        <div className="game-teams">
                          <div className={`game-team ${winner===0?"winner":winner===1?"winner":""}`}>{timeA}</div>
                          <div className="game-vs">vs</div>
                          <div className={`game-team ${winner===1?"winner":winner===0?"winner":""}`}>{timeB}</div>
                        </div>
                        {score && <div className="game-score">{score}</div>}
                        {g.penalties && <span className="game-badge">⚽ Pênaltis</span>}
                        {g.overtime && <span className="game-badge overtime">⏱ Prorrogação</span>}
                        {g.passou && <div className="game-classified">✅ Classificado: {g.passou}</div>}
                        {!score && <div style={{textAlign:"center", color:"#999", fontSize:12}}>Aguardando resultado</div>}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
